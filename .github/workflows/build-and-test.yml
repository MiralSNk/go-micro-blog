name: Build and Test

on:
  pull_request:
    branches: ["dev"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Здесь можно добавить шаги тестирования (юнит-тесты, линтеры, генерация proto)

      - name: Build Docker images
        run: |
          docker build -t blog-gateway:${{github.sha}} -f gateway/Dockerfile ./gateway