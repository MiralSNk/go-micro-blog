name: Build and Test

on: 
  push:
    branches: ["feat/**", "dev","main", "release/**"]
  pull_request: 
    branches: ["dev", "main"]
    types: [opened, reopened]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Build Docker images
        run: |
          docker build -t blog-gateway:${{github.sha}} -f gateway/Dockerfile .
