name: Deploy to Production

on:
    push:
        branches: ["main"]
    workflow_dispatch: 
        inputs:
            branch:
                description: 'Branch to deploy'
                required: true
                default: 'main'

jobs:
    deploy:
        runs-on: ubuntu-latest
        environment: production
        steps:
            - uses: actions/checkout@v4

            - name: Login to GitHub Container Registry
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{github.actor}}
                  password: ${{secrets.GITHUB_TOKEN}}
            
            - name: Build and push Docker images
              run: |
                export IMAGE_PREFIX=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
                echo "Using prefix: $IMAGE_PREFIX"

                docker build -t $IMAGE_PREFIX/gateway:${{github.sha}} -f gateway/Dockerfile .
                docker push $IMAGE_PREFIX/gateway:${{ github.sha }}

                docker tag $IMAGE_PREFIX/gateway:${{ github.sha }} $IMAGE_PREFIX/gateway:latest
                docker push $IMAGE_PREFIX/gateway:latest

            - name: Copy compose files to server via rsync
              uses: burnett01/rsync-deployments@6.0.0
              with:
                switches: -avzr --delete --exclude=".git" --exclude=".github" --exclude="gateway" --exclude="posts" --exclude="comments"
                path: ./
                remote_path: /home/${{ secrets.SERVER_USER_PROD }}/prod-blog/
                remote_host: ${{ secrets.SERVER_HOST_PROD }}
                remote_user: ${{ secrets.SERVER_USER_PROD }}
                remote_key: ${{ secrets.SSH_PRIVATE_KEY_PROD }}

            - name: Deploy with Docker Compose (prod)
              uses: appleboy/ssh-action@v1.0.3
              with:
                host: ${{ secrets.SERVER_HOST_PROD }}
                username: ${{ secrets.SERVER_USER_PROD }}
                key: ${{ secrets.SSH_PRIVATE_KEY_PROD }}
                script: |
                    mkdir -p /home/${{ secrets.SERVER_USER_PROD }}/prod-blog
                    cd /home/${{ secrets.SERVER_USER_PROD }}/prod-blog
                    echo "IMAGE_TAG=${{ github.sha }}" > .env
                    docker compose -f docker-compose.yml -f docker-compose.prod.yml pull
                    docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d